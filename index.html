
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <link rel="icon" type="image/png" href="/icon.png" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>MYRA</title>
      <meta name="description" content="MYRA — стриминг, социальные плейлисты и загрузка треков для независимых артистов в одном приложении." />
      <meta name="robots" content="noindex, nofollow" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <div id="boot" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#05050b;transition:opacity .45s ease">
        <div style="font-family:ui-sans-serif,system-ui,sans-serif;font-weight:900;font-size:34px;letter-spacing:-0.04em;color:#f2f2f8">MYRA</div>
        <div style="display:flex;gap:5px;margin-top:18px;height:22px;align-items:flex-end">
          <span style="width:5px;border-radius:99px;background:#8b5cf6;animation:bootB .7s ease-in-out infinite alternate"></span>
          <span style="width:5px;border-radius:99px;background:#a78bfa;animation:bootB .7s .15s ease-in-out infinite alternate"></span>
          <span style="width:5px;border-radius:99px;background:#c4b5fd;animation:bootB .7s .3s ease-in-out infinite alternate"></span>
        </div>
        <style>@keyframes bootB{from{height:6px;opacity:.5}to{height:22px;opacity:1}}</style>
      </div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
